:root {

  --cream: #ebe3d3; --line: #d9d1bf;
  --display: 'Iowan Old Style', 'Palatino', 'Palatino Linotype', Georgia, serif;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
}
* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); font-family: var(--sans); color: var(--ink); font-size: 14px; line-height: 1.5; }
button, input, textarea, select { font: inherit; color: inherit; }
input:focus, textarea:focus, select:focus, button:focus-visible { outline: 2px solid var(--forest); outline-offset: -1px; }
a { color: var(--forest-light); text-decoration: none; }
a:hover { text-decoration: underline; }
pre { font-family: inherit; margin: 0; }
.demo-banner { background: var(--terra); color: var(--surface); padding: 8px 16px; text-align: center; font-size: 12px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
.header { background: var(--forest); color: var(--surface); position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 8px rgba(30,58,44,0.15); }
.header-inner { max-width: 1100px; margin: 0 auto; padding: 16px 20px 12px; display: flex; align-items: center; gap: 12px; }
.brand-mark { width: 36px; height: 36px; background: var(--terra); color: var(--surface); font-family: var(--display); font-size: 22px; font-weight: 700; display: flex; align-items: center; justify-content: center; border-radius: 4px; }
.brand-name { font-family: var(--display); font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
.brand-sub { font-size: 11px; opacity: 0.7; letter-spacing: 0.05em; text-transform: uppercase; }
.nav { max-width: 1100px; margin: 0 auto; display: flex; overflow-x: auto; padding: 0 8px; border-top: 1px solid rgba(255,255,255,0.1); }
.nav-btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 14px; background: transparent; color: rgba(255,253,248,0.7); border: none; border-bottom: 2px solid transparent; cursor: pointer; font-size: 13px; font-weight: 500; white-space: nowrap; }
.nav-btn.active { color: var(--surface); border-bottom-color: var(--terra); }
.main { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }
.footer { max-width: 1100px; margin: 40px auto 0; padding: 20px; color: var(--ink-mute); font-size: 12px; text-align: center; border-top: 1px solid var(--line); display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
.reset-btn { background: transparent; color: var(--terra); border: none; cursor: pointer; font-size: 12px; text-decoration: underline; padding: 0; }
h2.view-title { font-family: var(--display); font-size: 26px; font-weight: 700; margin: 0 0 16px; color: var(--forest); letter-spacing: -0.02em; }
.view-intro { font-size: 13px; color: var(--ink-soft); line-height: 1.5; margin-bottom: 16px; }
.view-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
.btn, .btn-primary, .btn-sm { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; background: var(--surface); color: var(--forest); border: 1px solid var(--line); border-radius: 4px; font-size: 13px; font-weight: 500; cursor: pointer; text-decoration: none; }
.btn-primary { background: var(--forest); color: var(--surface); border-color: var(--forest); }
.btn-sm { padding: 6px 10px; font-size: 12px; }
.icon-btn { padding: 6px; background: transparent; border: none; color: var(--ink-mute); cursor: pointer; border-radius: 4px; }
.icon-btn:hover { color: var(--forest); background: var(--cream); }
.card { background: var(--surface); border: 1px solid var(--line); border-radius: 8px; padding: 20px; }
.card-title { font-family: var(--display); font-size: 17px; font-weight: 600; margin: 0 0 14px; color: var(--forest); }
.hero-card { background: var(--surface); border: 1px solid var(--line); border-radius: 8px; padding: 28px 24px; }
.hero-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--terra); font-weight: 600; margin-bottom: 6px; }
.hero-title { font-family: var(--display); font-size: 30px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 4px; color: var(--forest); line-height: 1.15; }
.hero-date { font-size: 15px; color: var(--ink-soft); margin-bottom: 8px; font-weight: 500; }
.hero-venue { font-size: 13px; color: var(--ink-mute); margin-bottom: 20px; }
.hero-stats { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 20px; padding-top: 16px; border-top: 1px solid var(--line); }
.stat-value { font-family: var(--display); font-size: 26px; font-weight: 700; line-height: 1; color: var(--forest); }
.stat-label { font-size: 11px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.05em; }
.hero-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.alert-card { display: flex; align-items: center; gap: 12px; background: #fbf4e3; border: 1px solid var(--amber); color: var(--amber); padding: 12px 16px; border-radius: 6px; font-size: 13px; }
.alert-link { background: transparent; border: none; color: var(--amber); font-weight: 600; cursor: pointer; margin-left: 8px; text-decoration: underline; }
.grid-two { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
.cat-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; margin-bottom: 8px; }
.cat-badge { background: var(--cream); padding: 2px 10px; border-radius: 10px; font-size: 12px; font-weight: 600; color: var(--forest); }
.race-mini-row { display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; margin-bottom: 10px; border-bottom: 1px solid var(--line); }
.race-mini-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.race-mini-name { font-size: 14px; font-weight: 500; }
.race-mini-date { font-size: 12px; color: var(--ink-mute); margin-top: 2px; }
.race-mini-days { font-size: 13px; font-weight: 600; color: var(--forest-light); }
.filter-bar { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.search-wrap { display: flex; align-items: center; gap: 8px; padding: 0 10px; background: var(--surface); border: 1px solid var(--line); border-radius: 4px; color: var(--ink-mute); flex: 1; min-width: 200px; }
.search-input { padding: 8px 0; background: transparent; border: none; outline: none; font-size: 13px; flex: 1; width: 100%; }
select.field { padding: 8px 10px; background: var(--surface); border: 1px solid var(--line); border-radius: 4px; font-size: 13px; width: 100%; }
.result-count { font-size: 12px; color: var(--ink-mute); margin-bottom: 12px; }
.rider-card { background: var(--surface); border: 1px solid var(--line); border-radius: 6px; padding: 12px 14px; margin-bottom: 8px; }
.rider-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.rider-name { font-size: 15px; font-weight: 600; }
.rider-meta { font-size: 12px; color: var(--ink-mute); margin-top: 2px; }
.plate-badge { background: var(--terra); color: var(--surface); padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: 600; font-family: var(--display); }
.contact-block { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--line); font-size: 13px; }
.contact-line { margin-bottom: 4px; }
.contact-key { background: var(--cream); color: var(--forest); padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-right: 6px; }
.contact-phone { color: var(--ink-mute); font-size: 12px; }
.payment-row { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 8px; font-size: 11px; }
.pay-chip { font-weight: 600; }
.race-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-top: 16px; }
.race-card { background: var(--surface); border: 1px solid var(--line); border-radius: 8px; padding: 18px; }
.race-card.past { opacity: 0.65; }
.race-num { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--terra); font-weight: 600; margin-bottom: 4px; }
.race-name { font-family: var(--display); font-size: 18px; font-weight: 700; margin: 0 0 6px; color: var(--forest); line-height: 1.2; }
.race-date { font-size: 13px; font-weight: 500; color: var(--ink-soft); margin-bottom: 8px; }
.race-venue { font-size: 12px; color: var(--ink-soft); margin-bottom: 2px; }
.race-address { font-size: 11px; color: var(--ink-mute); margin-bottom: 12px; }
.race-deadlines { font-size: 12px; color: var(--ink-soft); margin-bottom: 12px; padding-top: 10px; border-top: 1px solid var(--line); }
.race-deadlines > div { margin-bottom: 4px; }
.race-links { display: flex; gap: 6px; flex-wrap: wrap; }
.race-link { display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; background: var(--cream); color: var(--forest); border-radius: 3px; font-size: 11px; font-weight: 500; }
.race-tab-row { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
.race-tab { padding: 6px 10px; background: var(--surface); border: 1px solid var(--line); border-radius: 4px; font-size: 12px; color: var(--ink-soft); cursor: pointer; }
.race-tab.active { background: var(--forest); color: var(--surface); border-color: var(--forest); }
.wave-table { background: var(--surface); border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
.wave-header, .wave-row { display: grid; grid-template-columns: 1fr 1fr 0.6fr 1fr; gap: 8px; padding: 8px 12px; align-items: center; }
.wave-header { background: var(--cream); padding: 10px 12px; font-size: 11px; font-weight: 600; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.05em; }
.wave-row { border-top: 1px solid var(--line); }
.wave-cat { font-size: 13px; font-weight: 500; }
.wave-input { padding: 6px 8px; border: 1px solid var(--line); border-radius: 3px; font-size: 13px; background: var(--bg); width: 100%; }
.reminder-card { background: var(--surface); border: 1px solid var(--line); border-radius: 6px; padding: 12px 14px; margin-bottom: 8px; }
.reminder-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.reminder-title { font-size: 14px; font-weight: 600; color: var(--forest); }
.reminder-body { font-size: 13px; color: var(--ink-soft); line-height: 1.5; white-space: pre-wrap; }
.edit-card { background: var(--surface); border: 2px solid var(--forest); border-radius: 6px; padding: 16px; margin-bottom: 16px; }
.edit-input, .edit-textarea { padding: 8px 10px; border: 1px solid var(--line); border-radius: 4px; font-size: 13px; background: var(--bg); width: 100%; margin-bottom: 10px; }
.edit-input { font-size: 14px; }
.edit-textarea { resize: vertical; line-height: 1.5; }
.edit-actions { display: flex; gap: 8px; justify-content: flex-end; }
.var-code { display: block; margin-top: 6px; background: var(--cream); padding: 8px 10px; border-radius: 4px; font-size: 11px; font-family: monospace; color: var(--forest); line-height: 1.6; }
.composer-section { margin-bottom: 20px; }
.composer-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; color: var(--ink-soft); margin-bottom: 8px; }
.chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { padding: 5px 12px; background: var(--surface); border: 1px solid var(--line); border-radius: 100px; font-size: 12px; font-weight: 500; color: var(--ink-soft); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
.chip.on { background: var(--forest); color: var(--surface); border-color: var(--forest); }
.chip-count { background: rgba(0,0,0,0.1); padding: 0 6px; border-radius: 10px; font-size: 10px; }
.reminder-checklist { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 6px; }
.reminder-check { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--surface); border: 1px solid var(--line); border-radius: 4px; font-size: 13px; cursor: pointer; }
.reminder-check.on { background: var(--cream); border-color: var(--forest-light); }
.mode-toggle { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--line); border-radius: 6px; padding: 3px; }
.mode-btn { flex: 1; padding: 8px 12px; background: transparent; border: none; border-radius: 4px; font-size: 12px; font-weight: 500; color: var(--ink-soft); cursor: pointer; }
.mode-btn.active { background: var(--forest); color: var(--surface); }
.preview-section { margin-top: 24px; padding-top: 24px; border-top: 2px solid var(--line); }
.preview-header { font-family: var(--display); font-size: 18px; font-weight: 600; color: var(--forest); margin: 0 0 12px; }
.email-card { background: var(--surface); border: 1px solid var(--line); border-radius: 6px; margin-bottom: 8px; overflow: hidden; }
.email-head { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; cursor: pointer; }
.email-label { font-size: 13px; font-weight: 600; color: var(--forest); }
.email-recipients { font-size: 11px; color: var(--ink-mute); margin-top: 2px; }
.email-body { padding: 14px; border-top: 1px solid var(--line); background: var(--bg); }
.email-subject { font-size: 13px; margin-bottom: 10px; color: var(--ink-soft); }
.email-content { background: var(--surface); padding: 12px; border-radius: 4px; font-size: 12px; line-height: 1.5; white-space: pre-wrap; border: 1px solid var(--line); margin-bottom: 10px; max-height: 400px; overflow: auto; }
.email-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.chevron { transition: transform 0.2s; display: inline-block; }
.chevron.open { transform: rotate(90deg); }
</style>

    } else {
      var id = state.editingReminderId;
      next = state.reminders.map(function(r) {
        return r.id === id ? { id: r.id, title: state.reminderDraft.title, body: state.reminderDraft.body } : r;
      });
    }
    storage.set('reminders', next);
    state.reminders = next;
    state.editingReminderId = null;
    state.reminderDraft = { title: '', body: '' };
    render();
  }
  function remove(id) {
    if (!confirm('Delete this reminder?')) return;
    var next = state.reminders.filter(function(r) { return r.id !== id; });
    storage.set('reminders', next);
    state.reminders = next;
    render();
  }

  var editor = null;
  if (state.editingReminderId) {
    var titleInput = h('input', { class: 'edit-input', type: 'text', placeholder: 'Title', value: state.reminderDraft.title });
    titleInput.addEventListener('input', function(e) { state.reminderDraft.title = e.target.value; });
    var bodyTextarea = h('textarea', { class: 'edit-textarea', placeholder: 'Body \u2014 use {variables}', rows: 4 }, state.reminderDraft.body);
    bodyTextarea.addEventListener('input', function(e) { state.reminderDraft.body = e.target.value; });
    editor = h('div', { class: 'edit-card' },
      titleInput, bodyTextarea,
      h('div', { class: 'edit-actions' },
        h('button', { class: 'btn-sm', onclick: cancel }, icon('x', 14), 'Cancel'),
        h('button', { class: 'btn-primary', onclick: save }, icon('check', 14), 'Save')
      )
    );
  }

  var list = state.reminders.map(function(r) {
    return h('div', { class: 'reminder-card' },
      h('div', { class: 'reminder-head' },
        h('div', { class: 'reminder-title' }, r.title),
        h('div', { style: { display: 'flex', gap: '2px' } },
          h('button', { class: 'icon-btn', onclick: function() { startEdit(r); }, title: 'Edit' }, icon('edit', 14)),
          h('button', { class: 'icon-btn', onclick: function() { remove(r.id); }, title: 'Delete' }, icon('trash', 14))
        )
      ),
      h('div', { class: 'reminder-body' }, r.body)
    );
  });

  return h('div', null,
    h('div', { class: 'view-header' },
      h('h2', { class: 'view-title' }, 'Reminders Library'),
      h('button', { class: 'btn-primary', onclick: startNew }, icon('plus', 14), 'New reminder')
    ),
    h('p', { class: 'view-intro' },
      'Build your library once, then check off which ones go in each race email. Variables: ',
      h('code', { class: 'var-code' },
        '{firstName} {racePlate} {category} {waveTime} {laps} {stagingTime} {raceName} {raceDate} {raceVenue} {raceAddress} {volunteerLink} {flierLink} {regDeadline}')
    ),
    editor, h('div', null, list)
  );
}
function renderCompose() {
  var raceKey = state.composeRaceKey || nextUpcomingRace().key;
  var race;
  for (var i = 0; i < RACES.length; i++) if (RACES[i].key === raceKey) { race = RACES[i]; break; }

  var eligible = state.roster.filter(function(r) {
    if (!r.category || !state.composeSelectedCats.has(r.category)) return false;
    var status = r.racePayment && r.racePayment[raceKey];
    if (state.composePaidFilter === 'paid' && status !== 'Paid') return false;
    if (state.composePaidFilter === 'unpaid' && status === 'Paid') return false;
    return true;
  });
  var grouped = {};
  eligible.forEach(function(r) {
    if (!grouped[r.category]) grouped[r.category] = [];
    grouped[r.category].push(r);
  });

  function recipientsFor(rider) {
    var out = [];
    var m = state.composeRecipientMode;
    if (m === 'rider' || m === 'parents+rider') { if (rider.riderEmail) out.push(rider.riderEmail); }
    if (m === 'parents' || m === 'parents+rider') {
      if (rider.parent1 && rider.parent1.email) out.push(rider.parent1.email);
      if (rider.parent2 && rider.parent2.email && (!rider.parent1 || rider.parent2.email !== rider.parent1.email)) out.push(rider.parent2.email);
    }
    var seen = {};
    return out.filter(function(e) { if (seen[e]) return false; seen[e] = true; return true; });
  }

  function buildEmail(cat, riders) {
    var wave = (state.waveTimes[raceKey] && state.waveTimes[raceKey][cat]) || {};
    var vars = {
      raceName: race.name, raceDate: fmtDateLong(race.date), raceVenue: race.venue, raceAddress: race.address,
      volunteerLink: race.volunteer, flierLink: race.flier, regDeadline: fmtDateLong(race.regDeadline),
      category: cat,
      waveTime: wave.start || '[wave time TBD]',
      laps: wave.laps || '[laps TBD]',
      stagingTime: wave.staging || '[staging time TBD]',
      firstName: 'racers', racePlate: 'your assigned number'
    };
    var lines = [fillTemplate(state.composeIntro, vars), ''];
    var selR = state.reminders.filter(function(r) { return state.composeSelectedReminders.has(r.id); });
    selR.forEach(function(r, i) {
      lines.push((i + 1) + '. ' + r.title);
      lines.push(fillTemplate(r.body, vars));
      lines.push('');
    });
    lines.push('');
    lines.push(state.prefs.signature || '');
    var all = [];
    riders.forEach(function(r) { recipientsFor(r).forEach(function(e) { all.push(e); }); });
    var seen = {};
    var recipients = all.filter(function(e) { if (seen[e]) return false; seen[e] = true; return true; });
    return { subject: fillTemplate(state.composeSubject, vars), body: lines.join('\n'), recipients: recipients };
  }

  function buildPersonalized(rider) {
    var cat = rider.category;
    var wave = (state.waveTimes[raceKey] && state.waveTimes[raceKey][cat]) || {};
    var vars = {
      firstName: rider.firstName, racePlate: rider.racePlate || 'TBD', category: cat,
      waveTime: wave.start || '[wave time TBD]', laps: wave.laps || '[laps TBD]', stagingTime: wave.staging || '[staging time TBD]',
      raceName: race.name, raceDate: fmtDateLong(race.date), raceVenue: race.venue, raceAddress: race.address,
      volunteerLink: race.volunteer, flierLink: race.flier, regDeadline: fmtDateLong(race.regDeadline)
    };
    var lines = [fillTemplate(state.composeIntro, vars), ''];
    var selR = state.reminders.filter(function(r) { return state.composeSelectedReminders.has(r.id); });
    selR.forEach(function(r, i) {
      lines.push((i + 1) + '. ' + r.title);
      lines.push(fillTemplate(r.body, vars));
      lines.push('');
    });
    lines.push('');
    lines.push(state.prefs.signature || '');
    return { subject: fillTemplate(state.composeSubject, vars), body: lines.join('\n'), recipients: recipientsFor(rider) };
  }

  function mailtoLink(recipients, subject, body) {
    if (recipients.length === 1) {
      return 'mailto:' + encodeURIComponent(recipients[0]) + '?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
    }
    return 'mailto:?bcc=' + encodeURIComponent(recipients.join(',')) + '&subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
  }

  function copy(text, key) {
    navigator.clipboard.writeText(text).then(function() {
      state.copyFlash[key] = true;
      render();
      setTimeout(function() { state.copyFlash[key] = false; render(); }, 1500);
    });
  }

  function emailCard(label, email, keyPrefix) {
    if (email.recipients.length === 0) return null;
    var expanded = state.composeExpanded.has(keyPrefix);
    var head = h('div', {
      class: 'email-head',
      onclick: function() {
        if (expanded) state.composeExpanded.delete(keyPrefix);
        else state.composeExpanded.add(keyPrefix);
        render();
      }
    },
      h('div', null,
        h('div', { class: 'email-label' }, label),
        h('div', { class: 'email-recipients' },
          email.recipients.slice(0,3).join(', ') + (email.recipients.length > 3 ? ' +' + (email.recipients.length - 3) : ''))
      ),
      h('span', { class: 'chevron' + (expanded ? ' open' : '') }, icon('chevron', 16))
    );
    var body = null;
    if (expanded) {
      var copyAllBtn = h('button', { class: 'btn-sm', onclick: function() {
        copy('Subject: ' + email.subject + '\nTo: ' + email.recipients.join(', ') + '\n\n' + email.body, keyPrefix);
      } });
      if (state.copyFlash[keyPrefix]) {
        copyAllBtn.appendChild(icon('check', 14));
        copyAllBtn.appendChild(document.createTextNode('Copied!'));
      } else {
        copyAllBtn.appendChild(icon('copy', 14));
        copyAllBtn.appendChild(document.createTextNode('Copy all'));
      }
      body = h('div', { class: 'email-body' },
        h('div', { class: 'email-subject' }, h('strong', null, 'Subject: '), email.subject),
        h('pre', { class: 'email-content' }, email.body),
        h('div', { class: 'email-actions' },
          h('a', { class: 'btn-primary', href: mailtoLink(email.recipients, email.subject, email.body) }, icon('mail', 14), 'Open in Mail'),
          h('button', { class: 'btn-sm', onclick: function() { copy(email.recipients.join(', '), keyPrefix + '-r'); } }, icon('copy', 14), 'Copy recipients'),
          h('button', { class: 'btn-sm', onclick: function() { copy(email.body, keyPrefix + '-b'); } }, icon('copy', 14), 'Copy body'),
          copyAllBtn
        )
      );
    }
    return h('div', { class: 'email-card' }, head, body);
  }

  var raceSelect = h('select', { class: 'field', onchange: function(e) { setState({ composeRaceKey: e.target.value }); } });
  RACES.forEach(function(r) {
    raceSelect.appendChild(h('option', { value: r.key, selected: raceKey === r.key },
      'Race ' + r.id + ': ' + r.name + ' (' + fmtDate(r.date) + ')'));
  });

  var catChips = CATEGORIES.map(function(c) {
    var on = state.composeSelectedCats.has(c);
    var count = state.roster.filter(function(r) { return r.category === c; }).length;
    return h('button', {
      class: 'chip' + (on ? ' on' : ''),
      onclick: function() {
        if (on) state.composeSelectedCats.delete(c); else state.composeSelectedCats.add(c);
        render();
      }
    }, c, ' ', h('span', { class: 'chip-count' }, String(count)));
  });

  var paidSelect = h('select', { class: 'field', onchange: function(e) { setState({ composePaidFilter: e.target.value }); } });
  [{v:'all',l:'All riders'},{v:'paid',l:'Paid for this race only'},{v:'unpaid',l:'Unpaid only (chase payment)'}].forEach(function(o) {
    paidSelect.appendChild(h('option', { value: o.v, selected: state.composePaidFilter === o.v }, o.l));
  });
  var recipSelect = h('select', { class: 'field', onchange: function(e) { setState({ composeRecipientMode: e.target.value }); } });
  [{v:'parents+rider',l:'Parents + rider (when avail.)'},{v:'parents',l:'Parents only'},{v:'rider',l:'Rider only'}].forEach(function(o) {
    recipSelect.appendChild(h('option', { value: o.v, selected: state.composeRecipientMode === o.v }, o.l));
  });

  var reminderChecks = state.reminders.map(function(r) {
    var on = state.composeSelectedReminders.has(r.id);
    var cb = h('input', { type: 'checkbox', checked: on });
    cb.addEventListener('change', function() {
      if (on) state.composeSelectedReminders.delete(r.id); else state.composeSelectedReminders.add(r.id);
      render();
    });
    return h('label', { class: 'reminder-check' + (on ? ' on' : '') }, cb, h('span', null, r.title));
  });

  var subjInput = h('input', { class: 'edit-input', type: 'text', value: state.composeSubject });
  subjInput.addEventListener('input', function(e) { state.composeSubject = e.target.value; });
  var introTa = h('textarea', { class: 'edit-textarea', rows: 3 }, state.composeIntro);
  introTa.addEventListener('input', function(e) { state.composeIntro = e.target.value; });
  var sigTa = h('textarea', { class: 'edit-textarea', rows: 2 }, state.prefs.signature);
  sigTa.addEventListener('input', function(e) {
    var next = {};
    for (var k in state.prefs) next[k] = state.prefs[k];
    next.signature = e.target.value;
    state.prefs = next;
    storage.set('prefs', next);
  });

  var cards;
  if (state.composeMode === 'per-category') {
    cards = Object.keys(grouped).sort().map(function(cat) {
      var riders = grouped[cat];
      var email = buildEmail(cat, riders);
      var label = cat + ' \u00b7 ' + riders.length + ' rider' + (riders.length !== 1 ? 's' : '') + ' \u00b7 ' + email.recipients.length + ' recipient' + (email.recipients.length !== 1 ? 's' : '');
      return emailCard(label, email, 'cat-' + cat);
    });
  } else {
    cards = eligible.map(function(r) {
      var email = buildPersonalized(r);
      var label = r.firstName + ' ' + r.lastName + ' \u00b7 ' + r.category + ' \u00b7 #' + (r.racePlate || '?');
      return emailCard(label, email, 'rider-' + r.id);
    });
  }

  return h('div', null,
    h('h2', { class: 'view-title' }, 'Compose Race Emails'),
    h('div', { class: 'composer-section' }, h('div', { class: 'composer-label' }, 'Race'), raceSelect),
    h('div', { class: 'composer-section' },
      h('div', { class: 'composer-label' }, 'Categories to include (' + state.composeSelectedCats.size + ' of ' + CATEGORIES.length + ')'),
      h('div', { class: 'chip-row' }, catChips)
    ),
    h('div', { class: 'composer-section' },
      h('div', { class: 'grid-two' },
        h('div', null, h('div', { class: 'composer-label' }, 'Payment status'), paidSelect),
        h('div', null, h('div', { class: 'composer-label' }, 'Send to'), recipSelect)
      )
    ),
    h('div', { class: 'composer-section' },
      h('div', { class: 'composer-label' }, 'Include these reminders (' + state.composeSelectedReminders.size + ' of ' + state.reminders.length + ')'),
      h('div', { class: 'reminder-checklist' }, reminderChecks)
    ),
    h('div', { class: 'composer-section' },
      h('div', { class: 'composer-label' }, 'Subject template'), subjInput,
      h('div', { class: 'composer-label', style: { marginTop: '8px' } }, 'Intro template'), introTa,
      h('div', { class: 'composer-label', style: { marginTop: '8px' } }, 'Signature'), sigTa
    ),
    h('div', { class: 'composer-section' },
      h('div', { class: 'composer-label' }, 'Email mode'),
      h('div', { class: 'mode-toggle' },
        h('button', {
          class: 'mode-btn' + (state.composeMode === 'per-category' ? ' active' : ''),
          onclick: function() { setState({ composeMode: 'per-category' }); }
        }, 'One per category (' + Object.keys(grouped).length + ')'),
        h('button', {
          class: 'mode-btn' + (state.composeMode === 'per-rider' ? ' active' : ''),
          onclick: function() { setState({ composeMode: 'per-rider' }); }
        }, 'One per rider, personalized (' + eligible.length + ')')
      )
    ),
    h('div', { class: 'preview-section' },
      h('h3', { class: 'preview-header' },
        'Preview \u00b7 ' + (state.composeMode === 'per-category' ? Object.keys(grouped).length : eligible.length) +
        ' email' + (eligible.length !== 1 ? 's' : '') + ' ready'),
      cards
    )
  );
}
function renderFooter() {
  return h('footer', { class: 'footer' },
    'The Revolutions \u00b7 NJICL 2026 Season Dashboard \u00b7 DEMO with ' + state.roster.length + ' fake riders \u00b7 ',
    h('button', {
      class: 'reset-btn',
      onclick: function() {
        if (confirm('Reset all demo data? This restores the original 10 demo riders and default reminders.')) {
          storage.clear();
          state.roster = DEMO_ROSTER;
          state.reminders = DEFAULT_REMINDERS;
          state.waveTimes = {};
          state.prefs = { coachName: 'Coach Tom', signature: 'Go Revolutions!\n\u2014 Coach Tom' };
          render();
        }
      }
    }, 'Reset demo data')
  );
}

function render() {
  var app = document.getElementById('app');
  var body;
  switch (state.tab) {
    case 'roster':    body = renderRoster();    break;
    case 'races':     body = renderRaces();     break;
    case 'waves':     body = renderWaves();     break;
    case 'reminders': body = renderReminders(); break;
    case 'compose':   body = renderCompose();   break;
    default:          body = renderDashboard(); break;
  }
  app.innerHTML = '';
  app.appendChild(renderHeader());
  app.appendChild(h('main', { class: 'main' }, body));
  app.appendChild(renderFooter());
}

window.addEventListener('error', function(e) {
  document.getElementById('app').innerHTML =
    '<div style="padding:40px;color:#c45a3e;font-family:sans-serif">' +
    '<h2>Something went wrong</h2><pre>' + (e.error && e.error.stack || e.message) + '</pre></div>';
});

render();
</script>
</body>
</html>
